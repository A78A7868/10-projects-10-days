<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 01 - Pomodoro Timer</title>
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rain-container" id="rain-container"></div>
  <main class="app-container">
    <!-- Expandable Top Notch Timer -->
    <div class="containerSmall" id="notch-container">
      <div class="notch">
        <!-- Tiny timer shown when collapsed -->
        <p class="time" id="notch-collapsed-time">25:00</p>
        
        <!-- Expanded dashboard panel shown on hover -->
        <div class="notch-expanded-content">
          <div class="timerProgressRow">
            <div class="expandedTitle">
              <div class="title" id="notch-status-label">Work Session</div>
              <div class="timeExpanded" id="notch-expanded-time">25:00</div>
            </div>
            <span class="percentage" id="notch-percentage">0%</span>
          </div>
          
          <div class="progress-bar-wrapper">
            <div class="inner-bar">
              <div class="current-progress" id="notch-progress-fill" style="width: 0%;"></div>
            </div>
          </div>
          
          <div class="button-wrapper">
            <!-- Small controls -->
            <button class="notch-control-btn" id="notch-start-btn" aria-label="Toggle Timer">
              <svg viewBox="0 0 24 24" fill="currentColor" class="notch-icon-play">
                <path d="M8 5v14l11-7z" />
              </svg>
            </button>
            <button class="notch-control-btn" id="notch-reset-btn" aria-label="Reset Timer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="notch-icon-reset">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <header class="app-header">
      <div class="datetimeWrapper" id="header-datetime">
        <div class="row" id="header-time">12:00 PM</div>
        <div class="rowDate" id="header-date">Mon, Jan 1</div>
      </div>
      
      <div class="todayStatsWrapper" id="header-stats">
        <p class="title">Today's Focus</p>
        <p class="subtitle" id="header-focus-hours">0.0 hours</p>
      </div>
    </header>

    <!-- Floating Center Immersive Timer -->
    <section class="containerLarge" id="center-timer-container">
      <h3 class="timerStatus" id="center-status-label">Work Session</h3>
      <p class="time-large" id="center-time-display">25:00</p>
      
      <!-- Linear Progress Bar -->
      <div class="timerProgressRow">
        <div class="inner-bar-large">
          <div class="current-progress-large" id="center-progress-fill" style="width: 0%;"></div>
        </div>
        <span class="percentage-large" id="center-percentage">0%</span>
      </div>
      
      <!-- Hover controls -->
      <div class="btnRow">
        <button class="timeOpsBtn" id="center-start-btn" aria-label="Toggle Countdown">
          <svg viewBox="0 0 24 24" fill="currentColor" class="svgIcon" id="center-play-icon">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg viewBox="0 0 24 24" fill="currentColor" class="svgIcon hidden" id="center-pause-icon">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>
        <button class="timeOpsBtn" id="center-reset-btn" aria-label="Reset Countdown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="svgIcon">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
          </svg>
        </button>
      </div>
    </section>

    <!-- Floating Spotify Player Widget -->
    <div class="floating-widget spotify-widget" id="spotify-player-widget" style="top: 100px; left: 40px;">
      <div class="widget-header drag-handle">
        <div class="widget-title">
          <svg viewBox="0 0 24 24" class="widget-header-icon" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.82 14.42c-.2.3-.6.4-.9.2-2.43-1.48-5.5-1.82-9.1-1-1.02.24-2.04-.38-2.28-1.4-.24-1.02.38-2.04 1.4-2.28 4-.9 7.42-.5 10.22 1.2.3.2.4.6.2.9zm1.28-2.73c-.25.38-.75.5-1.13.25-2.78-1.7-7.02-2.2-10.3-1.2-1.22.37-2.52-.3-2.89-1.53-.37-1.22.3-2.52 1.53-2.89 4.07-1.23 8.76-.66 11.98 1.3.38.25.5.75.25 1.13zm.12-2.8c-3.34-2-8.87-2.18-12.02-1.22-1.63.5-3.34-.4-3.84-2.03-.5-1.63.4-3.34 2.03-3.84 4.03-1.22 10.12-.99 13.97 1.3 1.48.88 1.97 2.8 1.09 4.28-.88 1.48-2.8 1.97-4.28 1.09z"/>
          </svg>
          <span>Spotify Player</span>
        </div>
        <button class="widget-collapse-btn" id="spotify-expand-toggle" aria-label="Toggle Spotify Expand">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="widget-collapse-icon">
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
          </svg>
        </button>
      </div>
      <div class="widget-content">
        <div class="spotify-input-container">
          <input type="text" id="spotify-playlist-url" placeholder="Paste Spotify URL..." />
          <button id="spotify-load-btn">Load</button>
        </div>
        <div class="spotify-iframe-wrapper">
          <iframe id="spotify-iframe" src="https://open.spotify.com/embed/playlist/0vvXsW0l05Ur4IQI46sJsp" width="100%" height="220" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
        </div>
      </div>
    </div>

    <!-- Floating Checklist Widget -->
    <div class="floating-widget checklist-widget" id="checklist-tasks-widget" style="top: 100px; right: 40px;">
      <div class="widget-header drag-handle">
        <div class="widget-title">
          <svg viewBox="0 0 24 24" class="widget-header-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"></polyline>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          <span>Checklist</span>
        </div>
        <div class="checklist-count" id="checklist-progress-text">0/0</div>
      </div>
      <div class="widget-content">
        <div class="checklist-progress-bar">
          <div class="checklist-progress-fill" id="checklist-progress-fill" style="width: 0%;"></div>
        </div>
        <div class="checklist-items" id="checklist-items-container">
          <!-- Dynamically populated -->
        </div>
        <form class="checklist-add-form" id="checklist-add-form">
          <input type="text" id="checklist-new-task" placeholder="Add a new task..." required />
          <button type="submit" aria-label="Add Task">+</button>
        </form>
      </div>
    </div>
    
    <!-- Floating Bottom Utility Dock -->
    <div class="dock" id="bottom-utility-dock">
      <button class="dock-item" id="dock-mode-btn" data-tooltip="Switch Work/Break" aria-label="Toggle Session Mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dock-icon">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
          <line x1="6" y1="1" x2="6" y2="4"></line>
          <line x1="10" y1="1" x2="10" y2="4"></line>
          <line x1="14" y1="1" x2="14" y2="4"></line>
        </svg>
      </button>
      
      <button class="dock-item active" id="dock-spotify-btn" data-tooltip="Toggle Spotify" aria-label="Toggle Spotify Player">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dock-icon">
          <path d="M9 18V5l12-2v13"></path>
          <circle cx="6" cy="18" r="3"></circle>
          <circle cx="18" cy="16" r="3"></circle>
        </svg>
      </button>

      <button class="dock-item active" id="dock-checklist-btn" data-tooltip="Toggle Checklist" aria-label="Toggle Checklist Board">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dock-icon">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
      </button>

      <div class="dock-divider"></div>

      <button class="dock-item" id="dock-view-btn" data-tooltip="Toggle View (Focus/Dashboard/Minimal)" data-view="dashboard" aria-label="Toggle Workspace View">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dock-icon">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>

      <button class="dock-item" id="dock-settings-btn" data-tooltip="Workspace Settings" aria-label="Open Workspace Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dock-icon">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>

      <button class="dock-item" id="dock-reset-btn" data-tooltip="Reset Timer" aria-label="Reset Timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="dock-icon">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
        </svg>
      </button>
    </div>
  </main>

  <!-- Settings Modal Overlay -->
  <div class="modal-overlay hidden" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <header class="modal-header">
        <h2 id="modal-title">Workspace Settings</h2>
        <button class="close-modal-btn" id="close-settings-btn" aria-label="Close Settings">&times;</button>
      </header>
      
      <form class="settings-form" id="settings-form">
        <div class="form-group">
          <label for="work-duration">Work Interval (minutes)</label>
          <input type="number" id="work-duration" min="1" max="60" value="25" required>
        </div>
        
        <div class="form-group">
          <label for="break-duration">Break Interval (minutes)</label>
          <input type="number" id="break-duration" min="1" max="30" value="5" required>
        </div>

        <!-- Themes Selector inside Modal -->
        <div class="customizer-section">
          <h2>Select Theme</h2>
          <div class="theme-options">
            <button type="button" class="theme-option-btn active" data-theme="space">Space</button>
            <button type="button" class="theme-option-btn" data-theme="rain">Cozy Rain</button>
            <button type="button" class="theme-option-btn" data-theme="cafe">Lo-Fi Café</button>
          </div>
        </div>

        <!-- Ambient sound mixer inside Modal -->
        <div class="customizer-section">
          <h2>Ambient Audio Mixer</h2>
          <div class="sound-mixer">
            <div class="sound-control">
              <div class="sound-info">
                <span class="sound-name">Rainfall</span>
                <button type="button" class="sound-play-btn" id="rain-play-btn" aria-label="Toggle Rain">Play</button>
              </div>
              <input type="range" class="volume-slider" id="rain-volume" min="0" max="1" step="0.05" value="0.5" disabled>
            </div>
            
            <div class="sound-control">
              <div class="sound-info">
                <span class="sound-name">Café Ambience</span>
                <button type="button" class="sound-play-btn" id="cafe-play-btn" aria-label="Toggle Cafe">Play</button>
              </div>
              <input type="range" class="volume-slider" id="cafe-volume" min="0" max="1" step="0.05" value="0.5" disabled>
            </div>
          </div>
        </div>
        
        <button type="submit" class="save-settings-btn">Save Changes</button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
