<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 01 - Pomodoro Timer</title>
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rain-container" id="rain-container"></div>
  <main class="app-container">
    <!-- Expandable Top Notch Timer -->
    <div class="containerSmall" id="notch-container">
      <div class="notch">
        <!-- Tiny timer shown when collapsed -->
        <p class="time" id="notch-collapsed-time">25:00</p>
        
        <!-- Expanded dashboard panel shown on hover -->
        <div class="notch-expanded-content">
          <div class="timerProgressRow">
            <div class="expandedTitle">
              <div class="title" id="notch-status-label">Work Session</div>
              <div class="timeExpanded" id="notch-expanded-time">25:00</div>
            </div>
            <span class="percentage" id="notch-percentage">0%</span>
          </div>
          
          <div class="progress-bar-wrapper">
            <div class="inner-bar">
              <div class="current-progress" id="notch-progress-fill" style="width: 0%;"></div>
            </div>
          </div>
          
          <div class="button-wrapper">
            <!-- Small controls -->
            <button class="notch-control-btn" id="notch-start-btn" aria-label="Toggle Timer">
              <svg viewBox="0 0 24 24" fill="currentColor" class="notch-icon-play">
                <path d="M8 5v14l11-7z" />
              </svg>
            </button>
            <button class="notch-control-btn" id="notch-reset-btn" aria-label="Reset Timer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="notch-icon-reset">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <header class="app-header">
      <div class="datetimeWrapper" id="header-datetime">
        <div class="row" id="header-time">12:00 PM</div>
        <div class="rowDate" id="header-date">Mon, Jan 1</div>
      </div>
      
      <div class="todayStatsWrapper" id="header-stats">
        <p class="title">Today's Focus</p>
        <p class="subtitle" id="header-focus-hours">0.0 hours</p>
      </div>
    </header>

    <!-- Floating Center Immersive Timer -->
    <section class="containerLarge" id="center-timer-container">
      <h3 class="timerStatus" id="center-status-label">Work Session</h3>
      <p class="time-large" id="center-time-display">25:00</p>
      
      <!-- Linear Progress Bar -->
      <div class="timerProgressRow">
        <div class="inner-bar-large">
          <div class="current-progress-large" id="center-progress-fill" style="width: 0%;"></div>
        </div>
        <span class="percentage-large" id="center-percentage">0%</span>
      </div>
      
      <!-- Hover controls -->
      <div class="btnRow">
        <button class="timeOpsBtn" id="center-start-btn" aria-label="Toggle Countdown">
          <svg viewBox="0 0 24 24" fill="currentColor" class="svgIcon" id="center-play-icon">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg viewBox="0 0 24 24" fill="currentColor" class="svgIcon hidden" id="center-pause-icon">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>
        <button class="timeOpsBtn" id="center-reset-btn" aria-label="Reset Countdown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="svgIcon">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
          </svg>
        </button>
      </div>
    </section>

    <!-- Customizer Divider -->
    <hr class="customizer-divider">

    <!-- Customizer Toolbar -->
    <section class="customizer-container">
      <!-- Theme Selection -->
      <div class="customizer-section">
        <h2>Background Theme</h2>
        <div class="theme-options">
          <button class="theme-option-btn active" data-theme="space">Space</button>
          <button class="theme-option-btn" data-theme="cafe">Cozy Café</button>
          <button class="theme-option-btn" data-theme="rain">Rainy Day</button>
        </div>
      </div>

      <!-- Ambient Sound Mixer -->
      <div class="customizer-section">
        <h2>Ambient Audio Mixer</h2>
        <div class="sound-mixer">
          <div class="sound-control">
            <div class="sound-info">
              <span class="sound-name">Rainfall</span>
              <button class="sound-play-btn" id="rain-play-btn" aria-label="Toggle Rain">Play</button>
            </div>
            <input type="range" class="volume-slider" id="rain-volume" min="0" max="1" step="0.05" value="0.5" disabled>
          </div>
          
          <div class="sound-control">
            <div class="sound-info">
              <span class="sound-name">Café Ambience</span>
              <button class="sound-play-btn" id="cafe-play-btn" aria-label="Toggle Cafe">Play</button>
            </div>
            <input type="range" class="volume-slider" id="cafe-volume" min="0" max="1" step="0.05" value="0.5" disabled>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Settings Modal Overlay -->
  <div class="modal-overlay hidden" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <header class="modal-header">
        <h2 id="modal-title">Custom Timer Limits</h2>
        <button class="close-modal-btn" id="close-settings-btn" aria-label="Close Settings">&times;</button>
      </header>
      
      <form class="settings-form" id="settings-form">
        <div class="form-group">
          <label for="work-duration">Work Interval (minutes)</label>
          <input type="number" id="work-duration" min="1" max="60" value="25" required>
        </div>
        
        <div class="form-group">
          <label for="break-duration">Break Interval (minutes)</label>
          <input type="number" id="break-duration" min="1" max="30" value="5" required>
        </div>
        
        <button type="submit" class="save-settings-btn">Save Changes</button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
