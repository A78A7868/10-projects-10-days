<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 01 - Pomodoro Timer</title>
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container">
    <header class="app-header">
      <div class="header-main-row">
        <h1>Pomodoro</h1>
        <button class="settings-btn" id="open-settings-btn" aria-label="Open Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
      <p class="app-subtitle">Stay focused, stay productive</p>
    </header>

    <!-- Session Toggles -->
    <nav class="session-toggles" aria-label="Session Mode Selection">
      <button class="toggle-btn active" id="work-btn" data-mode="work">Work</button>
      <button class="toggle-btn" id="break-btn" data-mode="break">Break</button>
    </nav>

    <!-- Timer Circle Display -->
    <section class="timer-container" aria-live="polite">
      <div class="progress-ring-wrapper">
        <svg class="progress-ring" viewBox="0 0 300 300">
          <!-- Background circle track -->
          <circle class="progress-ring__track" cx="150" cy="150" r="135" stroke-width="10" fill="none" />
          <!-- Animated front circle progress indicator -->
          <circle class="progress-ring__progress" cx="150" cy="150" r="135" stroke-width="10" fill="none" id="progress-circle" />
        </svg>
        <div class="timer-text-content">
          <span class="timer-display" id="time-display">25:00</span>
          <span class="timer-status" id="timer-status">Work Session</span>
        </div>
      </div>
    </section>

    <!-- Controls Buttons -->
    <section class="controls-container">
      <button class="control-btn primary" id="start-pause-btn" aria-label="Start Timer">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" id="play-icon">
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg class="icon-pause hidden" viewBox="0 0 24 24" fill="currentColor" id="pause-icon">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
        <span id="start-pause-label">Start</span>
      </button>

      <button class="control-btn secondary" id="reset-btn" aria-label="Reset Timer">
        <svg class="icon-reset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
        </svg>
        <span>Reset</span>
      </button>
    </section>

    <!-- Customizer Divider -->
    <hr class="customizer-divider">

    <!-- Customizer Toolbar -->
    <section class="customizer-container">
      <!-- Theme Selection -->
      <div class="customizer-section">
        <h2>Background Theme</h2>
        <div class="theme-options">
          <button class="theme-option-btn active" data-theme="space">Space</button>
          <button class="theme-option-btn" data-theme="cafe">Cozy Café</button>
          <button class="theme-option-btn" data-theme="rain">Rainy Day</button>
        </div>
      </div>

      <!-- Ambient Sound Mixer -->
      <div class="customizer-section">
        <h2>Ambient Audio Mixer</h2>
        <div class="sound-mixer">
          <div class="sound-control">
            <div class="sound-info">
              <span class="sound-name">Rainfall</span>
              <button class="sound-play-btn" id="rain-play-btn" aria-label="Toggle Rain">Play</button>
            </div>
            <input type="range" class="volume-slider" id="rain-volume" min="0" max="1" step="0.05" value="0.5" disabled>
          </div>
          
          <div class="sound-control">
            <div class="sound-info">
              <span class="sound-name">Café Ambience</span>
              <button class="sound-play-btn" id="cafe-play-btn" aria-label="Toggle Cafe">Play</button>
            </div>
            <input type="range" class="volume-slider" id="cafe-volume" min="0" max="1" step="0.05" value="0.5" disabled>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Settings Modal Overlay -->
  <div class="modal-overlay hidden" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <header class="modal-header">
        <h2 id="modal-title">Custom Timer Limits</h2>
        <button class="close-modal-btn" id="close-settings-btn" aria-label="Close Settings">&times;</button>
      </header>
      
      <form class="settings-form" id="settings-form">
        <div class="form-group">
          <label for="work-duration">Work Interval (minutes)</label>
          <input type="number" id="work-duration" min="1" max="60" value="25" required>
        </div>
        
        <div class="form-group">
          <label for="break-duration">Break Interval (minutes)</label>
          <input type="number" id="break-duration" min="1" max="30" value="5" required>
        </div>
        
        <button type="submit" class="save-settings-btn">Save Changes</button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
